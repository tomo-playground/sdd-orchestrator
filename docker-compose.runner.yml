# GitHub Actions Self-Hosted Runner
# SDD 워크플로우 이벤트 드리븐 자동화 (cron 대체)
#
# 초기 설정:
#   1. 등록 토큰 발급: gh api repos/tomo-playground/shorts-producer/actions/runners/registration-token -X POST --jq '.token'
#   2. .env.runner 파일 생성 (아래 참조)
#   3. docker compose -f docker-compose.runner.yml up -d
#
# .env.runner 예시:
#   RUNNER_TOKEN=AAGHWNYA44BA...

services:
  github-runner:
    image: myoung34/github-runner:latest
    restart: unless-stopped
    environment:
      REPO_URL: https://github.com/tomo-playground/shorts-producer
      RUNNER_NAME: sdd-runner
      RUNNER_WORKDIR: /tmp/runner
      LABELS: self-hosted,sdd
      RUNNER_SCOPE: repo
    env_file:
      - .env.runner
    volumes:
      # 프로젝트 소스 접근 (읽기 전용 — checkout은 runner가 별도로 함)
      - /home/tomo/Workspace/shorts-producer:/opt/project:ro
      # Claude CLI 인증 공유
      - /home/tomo/.claude:/home/runner/.claude:ro
      # gh CLI 인증 공유
      - /home/tomo/.config/gh:/home/runner/.config/gh:ro
      # Docker socket (필요 시 하위 컨테이너 실행)
      - /var/run/docker.sock:/var/run/docker.sock
