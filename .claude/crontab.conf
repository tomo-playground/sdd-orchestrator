# SDD 인프라 crontab — 이 파일이 SSOT
# 적용: crontab ~/.claude-crontab 또는 sdd-orch.sh install-cron
# 스크립트 이름 변경 시 이 파일도 함께 수정할 것

PROJ=/home/tomo/Workspace/shorts-producer

# 서비스 헬스체크 (5분) — 다운 시 자동 재시작 + Slack 알림
*/5 * * * * bash $PROJ/.claude/scripts/sdd-health.sh

# Sentry patrol (매일 09:03) — 새 에러 수집 → GitHub Issue
3 9 * * * bash -c 'cd /home/tomo/Workspace/shorts-producer && set -a && source backend/.env && set +a && bash .claude/scripts/sdd-sentry.sh' >> /tmp/sentry-patrol.log 2>&1

# QA patrol (매일 09:08) — Playwright 순찰
8 9 * * * bash -c 'cd /home/tomo/Workspace/shorts-producer && bash .claude/scripts/sdd-qa.sh' >> /tmp/qa-patrol.log 2>&1

# GitHub Actions self-hosted runner (부팅 시)
@reboot cd /home/tomo/actions-runner && nohup ./run.sh > /tmp/runner1.log 2>&1 &
@reboot cd /home/tomo/actions-runner-2 && nohup ./run.sh > /tmp/runner2.log 2>&1 &

# SDD 오케스트레이터 (부팅 시)
@reboot /home/tomo/Workspace/shorts-producer/.claude/scripts/sdd-orch.sh start

# PR 리뷰/수정 폴링 (5분) — GitHub Actions 안전망
*/5 * * * * bash /home/tomo/Workspace/shorts-producer/.claude/scripts/sdd-fix.sh >> /tmp/sdd-fix.log 2>&1
