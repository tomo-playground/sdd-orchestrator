# LangFuse v3 Observability Stack
# Usage: docker compose -f docker-compose.langfuse.yml up -d
# Web UI: http://localhost:3001
# Default: LANGFUSE_ENABLED=false — 없어도 서비스 정상 동작

services:
  langfuse-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.3
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse

  langfuse-redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"

  langfuse-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9091"
    ports:
      - "9002:9000"
      - "9091:9091"
    environment:
      MINIO_ROOT_USER: langfuse
      MINIO_ROOT_PASSWORD: langfuse123
    volumes:
      - langfuse-minio-data:/data

  langfuse-web:
    image: langfuse/langfuse:3
    restart: unless-stopped
    depends_on:
      - langfuse-db
      - langfuse-clickhouse
      - langfuse-redis
      - langfuse-minio
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      CLICKHOUSE_URL: http://langfuse:langfuse@langfuse-clickhouse:8123
      REDIS_CONNECTION_STRING: redis://langfuse-redis:6379
      LANGFUSE_S3_MEDIA_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: langfuse123
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse-media
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      NEXTAUTH_SECRET: langfuse-dev-secret
      NEXTAUTH_URL: http://localhost:3001
      SALT: langfuse-dev-salt

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: unless-stopped
    depends_on:
      - langfuse-db
      - langfuse-clickhouse
      - langfuse-redis
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      CLICKHOUSE_URL: http://langfuse:langfuse@langfuse-clickhouse:8123
      REDIS_CONNECTION_STRING: redis://langfuse-redis:6379

volumes:
  langfuse-db-data:
  langfuse-clickhouse-data:
  langfuse-minio-data:
