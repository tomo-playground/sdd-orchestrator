name: Claude Review — PR 자동 리뷰

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: [self-hosted, sdd]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            CLAUDE.md를 읽고 프로젝트 규칙 기준으로 이 PR을 리뷰하세요.
            중점:
            - CLAUDE.md 규칙 위반
            - 버그/로직 오류
            - 보안 취약점
            - 테스트 누락
            - Data Mapping (Spread Passthrough) 위반

            리뷰만 하세요. 코드 수정은 하지 마세요.
            `gh pr comment`로 전체 리뷰 요약을 남기고,
            `mcp__github_inline_comment__create_inline_comment`로 구체적 이슈를 인라인 코멘트로 남기세요.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Read,Glob,Grep"
