name: SDD Sync — 머지 후 태스크 정리 + 열린 PR 자동 rebase

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    if: github.event.pull_request.merged == true
    runs-on: [self-hosted, sdd]
    timeout-minutes: 5

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Run sdd-sync
        run: bash .claude/scripts/sdd-sync.sh

  rebase-open-prs:
    if: github.event.pull_request.merged == true
    needs: cleanup
    runs-on: [self-hosted, sdd]
    timeout-minutes: 5

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Rebase open PRs onto main
        run: |
          MERGED_PR="${{ github.event.pull_request.number }}"
          OPEN_PRS=$(gh pr list --state open --base main --json number,headRefName \
            --jq ".[] | select(.number != ${MERGED_PR}) | \"\(.number) \(.headRefName)\"" 2>/dev/null)

          if [ -z "$OPEN_PRS" ]; then
            echo "열린 PR 없음 — rebase 불필요"
            exit 0
          fi

          echo "$OPEN_PRS" | while read PR_NUM BRANCH; do
            echo "=== PR #${PR_NUM} (${BRANCH}) rebase ==="

            git fetch origin "$BRANCH" 2>/dev/null || { echo "fetch 실패: $BRANCH"; continue; }
            git checkout "$BRANCH" 2>/dev/null || { echo "checkout 실패: $BRANCH"; continue; }

            if git rebase origin/main 2>/dev/null; then
              git push --force-with-lease 2>/dev/null && echo "PR #${PR_NUM} rebase 성공"
            else
              git rebase --abort 2>/dev/null
              gh pr comment "$PR_NUM" --body "rebase conflict 발생 — 수동 확인 필요" 2>/dev/null || true
              echo "PR #${PR_NUM} rebase conflict — PR에 코멘트 남김"
            fi
            fi

            git checkout main 2>/dev/null
          done
