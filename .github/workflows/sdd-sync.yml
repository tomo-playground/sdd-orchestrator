name: SDD Sync — 머지 정리

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sdd-sync
  cancel-in-progress: false

jobs:
  cleanup:
    if: github.event.pull_request.merged == true
    runs-on: [self-hosted, sdd]
    timeout-minutes: 5

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Run sdd-sync
        run: bash .claude/scripts/sdd-sync.sh

  rebase-open-prs:
    if: github.event.pull_request.merged == true
    needs: cleanup
    runs-on: [self-hosted, sdd]
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Rebase open PRs onto main
        run: |
          MERGED_PR="${{ github.event.pull_request.number }}"
          OPEN_PRS=$(gh pr list --state open --base main --json number,headRefName \
            --jq ".[] | select(.number != ${MERGED_PR}) | \"\(.number) \(.headRefName)\"" 2>/dev/null)

          if [ -z "$OPEN_PRS" ]; then
            echo "열린 PR 없음 — rebase 불필요"
            exit 0
          fi

          echo "$OPEN_PRS" | while read PR_NUM BRANCH; do
            echo "=== PR #${PR_NUM} (${BRANCH}) rebase ==="

            git fetch origin "$BRANCH" 2>/dev/null || { echo "fetch 실패: $BRANCH"; continue; }
            git checkout "$BRANCH" 2>/dev/null || { echo "checkout 실패: $BRANCH"; continue; }

            if git rebase origin/main 2>/dev/null; then
              git push --force-with-lease 2>/dev/null && echo "PR #${PR_NUM} rebase 성공"
            else
              echo "PR #${PR_NUM} rebase conflict — Claude로 해결 시도"
              git rebase --abort 2>/dev/null
              timeout 300 claude --worktree "${BRANCH}" --dangerously-skip-permissions -p \
                "이 브랜치(${BRANCH})를 main에 rebase하세요.
                1. git fetch origin main
                2. git rebase origin/main
                3. conflict 발생 시 파일을 읽고 의도에 맞게 해결
                4. git rebase --continue
                5. git push --force-with-lease
                6. 해결 불가하면 PR #${PR_NUM}에 코멘트: 'rebase conflict 자동 해결 실패 — 수동 확인 필요'" \
                2>/dev/null || {
                  gh pr comment "$PR_NUM" --body "rebase conflict 자동 해결 실패 (timeout) — 수동 확인 필요" 2>/dev/null || true
                  echo "PR #${PR_NUM} Claude rebase 실패/timeout"
                }
            fi

            git checkout main 2>/dev/null
          done

  qa-patrol:
    if: github.event.pull_request.merged == true
    needs: cleanup
    runs-on: [self-hosted, sdd]
    timeout-minutes: 5

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Run QA Patrol
        run: |
          cd frontend
          npx playwright test e2e/qa-patrol.spec.ts --reporter=line 2>&1 | tee /tmp/qa-patrol-result.txt
          EXIT_CODE=${PIPESTATUS[0]}

          if [ "$EXIT_CODE" -ne 0 ]; then
            FAILED=$(grep "FAILED\|✘\|Error" /tmp/qa-patrol-result.txt | head -5)
            gh issue create \
              --title "[QA Patrol] 머지 후 순찰 실패 — PR #${{ github.event.pull_request.number }}" \
              --body "PR #${{ github.event.pull_request.number }} 머지 후 QA 순찰 실패.

실패 테스트:
\`\`\`
${FAILED}
\`\`\`

[워크플로우 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
              --label "bug" 2>/dev/null || true
          fi
