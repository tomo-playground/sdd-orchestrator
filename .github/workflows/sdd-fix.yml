name: SDD Fix — 리뷰 수정

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to fix"
        required: false
        type: string
  # auto-fix: 리뷰 제출 시 1회만 트리거 (인라인 코멘트별 중복 방지)
  pull_request_review:
    types: [submitted]
  # manual: PR 코멘트에서 @claude 멘션
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

# workflow 레벨 concurrency 제거 — job별로 선별 적용
# 이유: workflow 레벨에서는 job if 평가 전에 cancel이 발생하여
# COMMENTED 리뷰가 CHANGES_REQUESTED auto-fix를 취소시킴

jobs:
  # Job 1: changes_requested 리뷰 → Claude 자동 수정 (bot + 사용자 모두)
  auto-fix:
    if: |
      (github.event_name == 'pull_request_review' &&
      github.event.review.state == 'changes_requested') ||
      (github.event_name == 'workflow_dispatch' &&
      github.event.inputs.pr_number != '')
    concurrency:
      group: sdd-autofix-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
      cancel-in-progress: false
    runs-on: [self-hosted, sdd]
    timeout-minutes: 30

    steps:
      - name: Get PR branch
        if: github.event_name == 'workflow_dispatch'
        id: pr_info
        run: |
          PR_NUM="${{ github.event.inputs.pr_number }}"
          BRANCH=$(gh pr view "$PR_NUM" --json headRefName --jq '.headRefName')
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr_info.outputs.branch || github.event.pull_request.head.ref || '' }}

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: ${{ github.event_name != 'workflow_dispatch' }}
          allowed_bots: "claude[bot],coderabbitai[bot]"

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
            REVIEWER: ${{ github.event.review.user.login || 'coding-machine' }}

            리뷰어가 이 PR에 변경 요청(changes_requested) 리뷰를 남겼습니다.
            1. `gh pr view ${{ github.event.pull_request.number || github.event.inputs.pr_number }}` 와 `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number || github.event.inputs.pr_number }}/reviews` 로 리뷰 내용을 읽으세요.
            2. CLAUDE.md를 읽고 프로젝트 규칙과 대조하세요.
            3. 버그 지적 → 코드 수정 + 커밋 + push
            4. 설계 개선 제안 → CLAUDE.md와 동의하면 수정, 아니면 PR에 "현행 유지 이유" 코멘트
            5. 스타일/Nit → 합리적이면 수정, 아니면 스킵
            6. 수정 완료 후 PR에 변경 내용 요약 코멘트를 남기세요.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Bash(git:*),Bash(ruff:*),Bash(npx prettier:*),Read,Edit,Write,Glob,Grep"

  # Job 2: @claude 멘션 → 수동 대응 (PR 코멘트 전용)
  manual:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude') &&
      !endsWith(github.event.comment.user.login, '[bot]')
    concurrency:
      group: sdd-manual-${{ github.event.issue.number }}
      cancel-in-progress: true
    runs-on: [self-hosted, sdd]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          track_progress: true

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Bash(git:*),Bash(ruff:*),Bash(npx prettier:*),Read,Edit,Write,Glob,Grep"
