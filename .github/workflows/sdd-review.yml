name: SDD Review — PR 리뷰

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: [self-hosted, sdd]
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PATH
        run: echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          allowed_bots: "claude[bot],coderabbitai[bot]"

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            ## 사전 단계: 기존 리뷰 확인 (중복 방지)
            리뷰 시작 전에 반드시 아래 명령으로 기존 코멘트를 확인하세요:
            ```
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments --jq '.[] | "\(.user.login) \(.path):\(.line) \(.body[:80])"'
            ```
            - claude[bot]이 이미 남긴 코멘트와 동일한 파일+이슈는 **다시 남기지 마세요**
            - PR 작성자가 "수정했습니다" 또는 "현행 유지" 등으로 응답한 이슈는 **재지적 금지**
            - 새로운 코드 변경에서 발생한 새로운 이슈만 코멘트하세요

            ## 리뷰 기준
            CLAUDE.md를 읽고 프로젝트 규칙 기준으로 이 PR을 리뷰하세요.
            중점:
            - CLAUDE.md 규칙 위반
            - 버그/로직 오류
            - 보안 취약점
            - 테스트 누락
            - Data Mapping (Spread Passthrough) 위반

            리뷰만 하세요. 코드 수정은 하지 마세요.
            `mcp__github_inline_comment__create_inline_comment`로 구체적 이슈를 인라인 코멘트로 남기세요.

            ## Severity 기준 (엄격히 준수)
            - **BLOCKER**: 데이터 소실, 보안 취약점, 런타임 크래시, CLAUDE.md Invariant 위반 → request-changes
            - **WARNING**: 로직 오류, 동기화 누락, 테스트 미커버 → 인라인 코멘트만 (approve 유지)
            - **NIT**: 타입 제네릭 누락, 에러 로깅 개선, 네이밍, 스타일 → 언급하지 마세요 (CI/Hook이 처리)

            리뷰 완료 후 반드시 PR Review를 submit하세요:
            - BLOCKER 이슈가 1개 이상: `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "리뷰 요약"`
            - BLOCKER 없음: `gh pr review ${{ github.event.pull_request.number }} --approve --body "리뷰 요약"`

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh api:*),Read,Glob,Grep"
