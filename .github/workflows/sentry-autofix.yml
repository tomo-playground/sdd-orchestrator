name: Sentry Autofix — 에러 수정

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue 번호 (수동 실행 시)'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

concurrency:
  group: sentry-autofix-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  autofix:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'issues' && github.event.label.name == 'sentry')
    runs-on: [self-hosted, sdd]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate issue
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS=$(gh issue view ${{ inputs.issue_number }} --json labels --jq '.labels[].name' 2>/dev/null || echo "")
          if ! echo "$LABELS" | grep -q "sentry"; then
            echo "::error::Issue #${{ inputs.issue_number }} does not have 'sentry' label"
            exit 1
          fi

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true

          prompt: |
            GitHub Issue #${{ steps.issue.outputs.number }} — Sentry 에러 자동 수정

            ## 절차
            1. `gh issue view ${{ steps.issue.outputs.number }}` 로 Issue 본문(스택트레이스)을 읽으세요.
            2. CLAUDE.md를 읽고 프로젝트 규칙을 확인하세요.
            3. 스택트레이스를 분석하여 원인 코드를 찾으세요.

            ## 수정 불가 판단 (PR 생성 안 함)
            아래 경우 PR을 만들지 말고, Issue에 분석 결과를 코멘트하고 `needs-manual-fix` 라벨을 추가하세요:
            - 외부 서비스 장애 (Sentry API, SD WebUI, 네트워크 등)
            - DB 스키마 변경 필요 (models/*.py 수정)
            - 재현 불가능한 일시적 에러
            - 원인 파악 불가

            ## 수정 가능한 경우
            4. `fix/sentry-${{ steps.issue.outputs.number }}` 브랜치를 생성하세요.
            5. 실패 테스트를 먼저 작성하세요 (TDD).
            6. 테스트가 통과하도록 코드를 수정하세요.
            7. 린트를 확인하세요 (ruff check, prettier).
            8. 커밋 메시지: `fix: [Sentry] 에러 설명`
            9. push 후 PR을 생성하세요.
               - 제목: `fix: [Sentry] 에러 설명`
               - 본문에 반드시 `Fixes #${{ steps.issue.outputs.number }}` 포함
               - `--label bug --label sentry --assignee stopper2008`
            10. PR 생성 후 Issue에 PR 링크를 코멘트하세요.

          claude_args: |
            --allowedTools "Bash,Read,Edit,Write,Glob,Grep"
