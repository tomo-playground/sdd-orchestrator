# SDD Health Check — Periodic orchestrator status check
name: health-check

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check task consistency
        run: |
          echo "=== Task Status ==="
          STATE_DB=".sdd/state.db"
          for dir in .claude/tasks/current/SP-*; do
            [ -d "$dir" ] || continue
            SP=$(basename "$dir" | cut -d_ -f1)
            if [ -f "$STATE_DB" ]; then
              STATUS=$(sqlite3 "$STATE_DB" "SELECT status FROM task_status WHERE task_id='$SP'" 2>/dev/null || echo "pending")
              [ -z "$STATUS" ] && STATUS="pending"
            else
              STATUS="unknown"
            fi
            echo "$SP: $STATUS"
          done

      - name: Check for stale running tasks
        run: |
          STALE=0
          STATE_DB=".sdd/state.db"
          if [ ! -f "$STATE_DB" ]; then
            echo "state.db not found — skipping stale check"
            exit 0
          fi
          for dir in .claude/tasks/current/SP-*; do
            [ -d "$dir" ] || continue
            SP=$(basename "$dir" | cut -d_ -f1)
            STATUS=$(sqlite3 "$STATE_DB" "SELECT status FROM task_status WHERE task_id='$SP'" 2>/dev/null)
            if [ "$STATUS" = "running" ]; then
              echo "WARNING: $SP is in running state — check if process is alive"
              STALE=$((STALE + 1))
            fi
          done
          if [ "$STALE" -gt 0 ]; then
            echo "::warning::$STALE tasks in running state may be stale"
          fi
