# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# Shorts Producer — CodeRabbit 코드 리뷰 설정
#
# 설계 원칙:
#   1. CLAUDE.md가 code_guidelines로 자동 로드 → custom_instructions는 빈틈 보완만
#   2. Claude 셀프 리뷰(/code-review)와 역할 분담 → 중복 검증 제거
#   3. profile: chill → 진짜 버그/데이터 소실만 집중, nitpick 자제
#   4. PR 생성 시 1회 리뷰 → incremental off (수동: @coderabbitai review)

language: ko-KR
tone_instructions: >-
  시니어 엔지니어 관점. 간결하게.
  버그, 데이터 소실 위험, 보안 취약점에만 집중.
  스타일/포매팅/unused import는 언급하지 마세요 (pre-commit hook이 처리).
early_access: false
enable_free_tier: true

# ─── 리뷰 설정 ───
reviews:
  profile: chill
  request_changes_workflow: true
  fail_commit_status: true

  # CLAUDE.md가 code_guidelines로 로드되므로 규칙을 반복하지 않는다.
  # 여기는 CLAUDE.md에 없지만 리뷰에서 반복 발견된 빈틈만 보완.
  custom_instructions: |
    ## 보완 규칙 (CLAUDE.md 외)

    ### 하드코딩 감지
    - config.py에 os.getenv()로 정의된 상수를 문자열 리터럴로 직접 사용하면 지적
    - 예: `model="gemini-2.5-flash-image"` → `model=GEMINI_IMAGE_MODEL`
    - 예: `"http://localhost:8000"` → `API_PUBLIC_URL`

    ### .env.example 동기화
    - config.py에 새 `os.getenv("NEW_VAR")` 추가 시 `backend/.env.example`에도 추가됐는지 확인

    ### 리뷰 제외 영역
    - unused import, 포매팅, 줄바꿈, trailing whitespace — pre-commit hook(ruff/prettier)이 처리하므로 언급 금지
    - 타입 에러, 빌드 에러 — CI가 잡으므로 언급 금지

  high_level_summary: false
  high_level_summary_placeholder: "@coderabbitai summary"
  auto_title_placeholder: "@coderabbitai"
  review_status: false
  commit_status: true
  collapse_walkthrough: true
  changed_files_summary: false
  sequence_diagrams: false

  assess_linked_issues: true
  related_issues: true
  related_prs: true

  suggested_labels: true
  auto_apply_labels: true
  suggested_reviewers: false
  auto_assign_reviewers: false

  poem: false

  # ─── 라벨링 규칙 ───
  labeling_instructions:
    - label: "frontend"
      instructions: "Next.js/React 컴포넌트, Zustand 스토어, hooks 변경"
    - label: "backend"
      instructions: "FastAPI 라우터, services/, models/ 변경"
    - label: "ffmpeg"
      instructions: "services/video/, 렌더링 파이프라인 변경"
    - label: "ai-generation"
      instructions: "services/agent/, Gemini/SD 이미지 생성 파이프라인 변경"
    - label: "config"
      instructions: "config.py, config_pipelines.py, .env 관련 변경"

  # ─── 리뷰 대상 경로 ───
  path_filters:
    - "backend/**"
    - "frontend/**"
    - "audio/**"
    - "**/*.py"
    - "**/*.ts"
    - "**/*.tsx"
    # 제외
    - "!frontend/node_modules/**"
    - "!backend/.venv/**"
    - "!audio/.venv/**"
    - "!**/__pycache__/**"
    - "!backend/outputs/**"
    - "!backend/tests/**"
    - "!audio/tests/**"
    - "!**/*.test.ts"
    - "!**/*.test.tsx"
    - "!.claude/**"
    - "!.github/**"

  # ─── 경로별 리뷰 가이드 (빈틈 보완, CLAUDE.md와 중복 최소화) ───
  path_instructions:
    - path: "backend/routers/**"
      instructions: |
        - `response_model=` 지정 필수 (raw dict 반환 금지)
        - 비즈니스 로직은 `services/`에 위임
        - 신규 엔드포인트 → REST API 명세 업데이트 확인
    - path: "backend/models/**"
      instructions: |
        - Boolean은 `Boolean` 타입 + `is_`/`_enabled` 네이밍
        - 미디어 참조는 `media_asset_id` FK (URL 컬럼 금지)
        - JSON은 `JSONB` 타입
        - DB_SCHEMA.md 업데이트 확인
    - path: "backend/services/agent/**"
      instructions: |
        - Gemini 호출 시 `system_instruction` 분리 (contents에 합치기 금지)
        - `GEMINI_SAFETY_SETTINGS` (config.py) 필수 적용
        - PROHIBITED_CONTENT 시 `GEMINI_FALLBACK_MODEL`로 1회 재시도
    - path: "backend/alembic/**"
      instructions: |
        - downgrade()에 역방향 마이그레이션 포함
        - DB_SCHEMA.md 동기화 확인
    - path: "backend/config.py"
      instructions: |
        - 새 os.getenv() 추가 시 .env.example 동기화 필수
        - 기본값에 localhost 사용 시 환경별 오버라이드 가능한지 확인
    - path: "frontend/app/store/**"
      instructions: |
        - 활성 엔티티 삭제 시 스토어 전체 리셋
        - Spread Passthrough 패턴 준수 (Whitelist 매핑 금지)
    - path: "frontend/app/store/actions/storyboardActions.ts"
      instructions: |
        - Invariant 검증: delete/persist/autoSave 3자 상호작용 충돌 확인
        - 404 처리 변경 시 삭제 시나리오와의 충돌 필수 확인 (ADR-001)
        - autoSave에서 POST(CREATE) 호출 추가 금지 (INV-2)
        - persistStoryboard에서 404→재생성 로직 추가 금지 (INV-1)
    - path: "frontend/app/store/effects/autoSave.ts"
      instructions: |
        - autoSave는 UPDATE(PUT)만 수행 (INV-2, ADR-003)
        - storyboardId null이면 스킵 — CREATE 경로 추가 금지
        - 실패 시 무한 재시도 금지 (3회 제한)
    - path: "backend/services/storyboard/**"
      instructions: |
        - 모든 쿼리에 `deleted_at.is_(None)` 필터 필수
        - Spread Passthrough 패턴 준수

  abort_on_close: true
  disable_cache: false

  # ─── 자동 리뷰 설정 ───
  auto_review:
    enabled: true
    auto_incremental_review: false  # PR 생성 시 1회. 재리뷰: @coderabbitai review
    ignore_title_keywords:
      - "WIP"
      - "[draft]"
    drafts: false
    base_branches:
      - "main"

  # ─── 도구 (pre-commit hook과 중복 최소화) ───
  tools:
    ruff:
      enabled: true
    eslint:
      enabled: true
    markdownlint:
      enabled: false
    languagetool:
      enabled: false
    yamllint:
      enabled: false
    shellcheck:
      enabled: false
    biome:
      enabled: false
    hadolint:
      enabled: false
    phpstan:
      enabled: false
    golangci-lint:
      enabled: false
    swiftlint:
      enabled: false
    checkov:
      enabled: false
    detekt:
      enabled: false
    gitleaks:
      enabled: true   # 시크릿 유출 감지는 유지

# ─── 챗봇 ───
chat:
  auto_reply: true

# ─── 지식 기반 ───
knowledge_base:
  opt_out: false
  web_search:
    enabled: false  # 비용 절감
  code_guidelines:
    enabled: true
    # CLAUDE.md는 기본 자동 포함. 나머지는 CLAUDE.md가 참조하므로 별도 로드 불필요.
    filePatterns: []
  learnings:
    scope: auto  # @coderabbitai 피드백 → 자동 학습 → false positive 감소
  issues:
    scope: auto
  pull_requests:
    scope: auto
