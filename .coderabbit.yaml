# Shorts Producer — CodeRabbit 코드 리뷰 설정
# SDD 워크플로우의 독립 AI 리뷰어 역할
# CLAUDE.md를 SSOT로 참조하여 프로젝트 규칙 적용

language: ko-KR
tone_instructions: |
  시니어 엔지니어 관점에서 명확하고 간결한 피드백. 다음을 중점 확인:
  - CLAUDE.md에 정의된 아키텍처/코딩 규칙 준수
  - 데이터 소실 위험 (Spread Passthrough 위반, null 덮어쓰기)
  - Soft Delete 일관성 (deleted_at 필터 누락)
  - 하드코딩된 URL/경로 대신 환경 변수 사용
  - 코드 크기 한도 (함수 50줄, 컴포넌트 200줄, 파일 400줄)
early_access: false
enable_free_tier: true

# ─── 리뷰 설정 ───
reviews:
  profile: assertive
  request_changes_workflow: true

  custom_instructions: |
    이 프로젝트는 CLAUDE.md를 SSOT(Single Source of Truth)로 사용합니다.
    리뷰 시 반드시 CLAUDE.md의 규칙을 참조하세요.

    ## 핵심 검증 항목

    ### 1. API Contract (CLAUDE.md "API Contract Principles")
    - 모든 라우터 엔드포인트에 `response_model=` 필수
    - 응답에 `dict | None` 금지 — Pydantic 모델로 명시
    - 신규 엔드포인트 시 REST API 명세 (`docs/03_engineering/api/`) 업데이트 필수

    ### 2. Data Mapping (CLAUDE.md "Data Mapping Principles")
    - Whitelist 매핑 금지 — Spread(`...`) 패스스루 + 변환 필요한 필드만 오버라이드
    - 신규 필드 추가 시 매핑 함수에서 누락 → null 덮어쓰기 → 데이터 소실 위험

    ### 3. Soft Delete 일관성 (CLAUDE.md "Frontend State Sync Principles")
    - 모든 GET/PUT/PATCH 쿼리에 `deleted_at.is_(None)` 필터 필수
    - 삭제 = 즉시 스토어 전체 리셋 + 안전한 화면으로 리다이렉트
    - 404 = 삭제된 것으로 간주, 에러 무시하지 않음

    ### 4. Configuration SSOT (CLAUDE.md "Configuration Principles")
    - 모든 상수/환경변수는 `backend/config.py`에서 관리
    - 프롬프트 규칙은 LangFuse에서 관리, 코드 하드코딩 금지
    - Tag 규칙(충돌/별칙/필터)은 DB 테이블에서 관리

    ### 5. DB Schema (CLAUDE.md "DB Schema Design Principles")
    - 미디어 참조는 `media_asset_id` FK 필수, URL 직접 저장 금지
    - Boolean은 Boolean 타입 + `is_`/`_enabled` 네이밍
    - JSON은 JSONB, Text에 JSON 문자열 저장 금지

    ### 6. Tag Format (CLAUDE.md "Tag Format Standard")
    - 모든 태그는 언더바(_) 형식 (`brown_hair`, `looking_at_viewer`)
    - 공백 형식 변환 `tag.replace("_", " ")` 금지
    - LoRA 트리거 워드만 Civitai 원본 형식 유지

    ### 7. Frontend 규칙
    - 서비스 화면은 `API_BASE` 사용, `ADMIN_API_BASE`는 어드민 페이지만
    - UI 최소 폰트 11px, 본문/버튼은 `text-xs`(13px) 이상
    - 코드 크기: 함수 50줄, 컴포넌트 200줄, 파일 400줄

    ### 8. Service vs Admin API 분리
    - Service API (`/api/v1`): 일반 사용자 기능
    - Admin API (`/api/admin`): 시스템 관리, 일괄 작업, 영구 삭제

  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  auto_title_placeholder: "@coderabbitai"
  review_status: true
  commit_status: true
  fail_commit_status: true  # SDD 독립 리뷰어 — 심각 이슈 시 머지 차단

  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: false  # 불필요한 노이즈 감소

  assess_linked_issues: true
  related_issues: true
  related_prs: true

  suggested_labels: true
  auto_apply_labels: true  # 라벨 자동 적용
  suggested_reviewers: false
  auto_assign_reviewers: false

  poem: false

  # ─── 라벨링 규칙 ───
  labeling_instructions:
    - label: "frontend"
      instructions: "Next.js/React 컴포넌트, Zustand 스토어, hooks 변경"
    - label: "backend"
      instructions: "FastAPI 라우터, services/, models/ 변경"
    - label: "ffmpeg"
      instructions: "services/video/, 렌더링 파이프라인 변경"
    - label: "ai-generation"
      instructions: "services/agent/, Gemini/SD 이미지 생성 파이프라인 변경"
    - label: "config"
      instructions: "config.py, config_pipelines.py, .env, 환경 설정 변경"
    - label: "assets"
      instructions: "폰트, 오버레이, 포즈 에셋 등 정적 자원 변경"
    - label: "docs"
      instructions: "docs/, README, CLAUDE.md 등 문서 변경"

  # ─── 리뷰 대상 경로 ───
  path_filters:
    - "backend/**"
    - "frontend/**"
    - "audio/**"
    - "docs/**"
    - "**/*.py"
    - "**/*.ts"
    - "**/*.tsx"
    - "!frontend/node_modules/**"
    - "!backend/.venv/**"
    - "!backend/__pycache__/**"
    - "!backend/outputs/**"
    - "!audio/.venv/**"
    - "!**/*.test.ts"
    - "!**/*.test.tsx"

  # ─── 경로별 리뷰 가이드 ───
  path_instructions:
    - path: "backend/routers/**"
      instructions: |
        API 라우터 검증:
        - `response_model=` 지정 필수 (raw dict 반환 금지)
        - 비즈니스 로직은 `services/`에 위임 (라우터는 가볍게)
        - Service vs Admin 라우터 분리 기준 준수
        - 신규 엔드포인트 → REST API 명세 문서 업데이트 확인
    - path: "backend/models/**"
      instructions: |
        ORM 모델 검증:
        - Boolean은 `Boolean` 타입 + `is_`/`_enabled` 네이밍
        - 미디어 참조는 `media_asset_id` FK (URL 컬럼 금지)
        - JSON은 `JSONB` 타입 (Text에 JSON 저장 금지)
        - FK에 CASCADE 정책 명시
        - DB_SCHEMA.md 업데이트 확인
    - path: "backend/services/agent/**"
      instructions: |
        LangGraph 파이프라인 검증:
        - Gemini 호출 시 `system_instruction` 분리 (contents에 합치기 금지)
        - `GEMINI_SAFETY_SETTINGS` (config.py) 필수 적용
        - PROHIBITED_CONTENT 시 `GEMINI_FALLBACK_MODEL`로 1회 재시도
        - 프롬프트 규칙은 LangFuse에서 관리 (코드 하드코딩 금지)
    - path: "backend/services/video/**"
      instructions: |
        렌더링/TTS 파이프라인 검증:
        - FFmpeg 명령어 쉘 인젝션 방지
        - 임시 파일 정리 (`shutil.rmtree`) 필수
        - TTS seed 일관성 (voice_preset.voice_seed 우선)
    - path: "backend/alembic/**"
      instructions: |
        마이그레이션 검증:
        - 네이밍 규칙 (Boolean→`is_`, FK→`_id`)
        - downgrade()에 역방향 마이그레이션 포함
        - DB_SCHEMA.md 동기화 확인
    - path: "frontend/app/store/**"
      instructions: |
        Zustand 스토어 검증:
        - 활성 엔티티 삭제 시 스토어 전체 리셋 + localStorage 정리
        - autoSave와의 경합 조건 주의
        - Spread Passthrough 패턴 준수 (Whitelist 매핑 금지)
    - path: "frontend/app/components/**"
      instructions: |
        React 컴포넌트 검증:
        - 컴포넌트 200줄, 파일 400줄 한도
        - API 호출은 `/api/` 상대 경로 (Next.js rewrite 프록시 경유)
        - 서비스 화면에서 `ADMIN_API_BASE` 사용 금지
        - 최소 폰트 11px, 본문 `text-xs` 이상
    - path: "frontend/app/hooks/**"
      instructions: |
        커스텀 훅 검증:
        - useEffect 의존성 배열 정확성 (무한 루프 방지)
        - useCallback deps에 불안정 참조 포함 여부
        - cleanup 함수 반환 필수 (구독/타이머)
    - path: "backend/config.py"
      instructions: |
        설정 SSOT 검증:
        - 모든 상수/환경변수는 이 파일에서 관리
        - 개별 파일 하드코딩 금지
        - os.getenv() 기본값에 localhost 사용 시 환경별 오버라이드 가능한지 확인

  abort_on_close: true
  disable_cache: false

  # ─── 자동 리뷰 설정 ───
  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords:
      - "WIP"
      - "draft"
      - "chore"
    drafts: false
    base_branches:
      - "main"

# ─── 챗봇 ───
chat:
  auto_reply: true

# ─── 지식 기반 ───
knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - "CLAUDE.md"
      - "GEMINI.md"
      - "docs/guides/CONTRIBUTING.md"
      - "docs/03_engineering/architecture/DB_SCHEMA.md"
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
