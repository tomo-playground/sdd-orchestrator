# Core infrastructure: PostgreSQL + MinIO + ComfyUI
# Usage: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shorts_app
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: shorts_producer
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shorts_app -d shorts_producer"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  comfyui:
    build:
      context: ./comfyui-docker
      dockerfile: Dockerfile
    image: comfyui:latest
    container_name: comfyui
    restart: on-failure:5
    ports:
      - "8188:8188"
    volumes:
      - /home/tomo/Workspace/sd-models/checkpoints:/workspace/ComfyUI/models/checkpoints
      - /home/tomo/Workspace/sd-models/lora:/workspace/ComfyUI/models/loras
      - /home/tomo/Workspace/sd-models/embeddings:/workspace/ComfyUI/models/embeddings
      - /home/tomo/Workspace/sd-models/controlnet:/workspace/ComfyUI/models/controlnet
      - /home/tomo/Workspace/sd-models/clip_vision:/workspace/ComfyUI/models/clip_vision
      - comfyui-output:/workspace/ComfyUI/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
  pgadmin-data:
  comfyui-output:
